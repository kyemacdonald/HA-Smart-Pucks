esphome:
  name: esphome-web-cec770
  friendly_name: Smart Puck 1
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz

# Tracking variable to coordinate wake word restarts
globals:
  - id: tts_active
    type: bool
    restore_value: no
    initial_value: 'false'

logger:

api:
  on_client_connected:
    then:
      - delay: 500ms
      - light.turn_off: led_circle
      - media_player.volume_set: 1.0
      - micro_wake_word.start:
  on_client_disconnected:
    then:
      - voice_assistant.stop: 

# Using two separate named buses to prevent I2S hardware contention on the S3
i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO04
    i2s_bclk_pin: GPIO05

  - id: spk_bus
    i2s_lrclk_pin: GPIO06
    i2s_bclk_pin: GPIO07

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: mic_bus
    adc_type: external        
    i2s_din_pin: GPIO16
    channel: right  
    pdm: false

speaker:
  - platform: i2s_audio
    id: big_speaker
    i2s_audio_id: spk_bus
    i2s_dout_pin: GPIO15
    dac_type: external
    channel: stereo
    sample_rate: 44100
    bits_per_sample: 16bit

  - platform: resampler
    id: voice_resampler
    output_speaker: big_speaker

media_player:
  - platform: speaker
    id: esps3_media_player
    name: VA Circle Media Player
    buffer_size: 65536
    volume_initial: 100%
    announcement_pipeline:
      speaker: voice_resampler
      format: MP3
    files:
      - id: alert_sound
        file: "audio/pop.mp3"
    on_play:
      - switch.turn_on: amp_enable
      - light.turn_on:
          id: led_circle           
          brightness: 90%
          effect: "Talking Swirl"
    on_announcement:
      - switch.turn_on: amp_enable
      - light.turn_on:
          id: led_circle           
          brightness: 90%
          effect: "Talking Swirl"
    on_pause:            
      - switch.turn_off: amp_enable 
      - light.turn_off: led_circle
    on_idle:
      - switch.turn_off: amp_enable 
      - light.turn_off: led_circle
      # Safety-net: wait long enough for VA state machine to fully settle
      # (VA wind-down can take ~400ms after on_idle fires), then restart
      # MWW only if neither VA nor MWW is already running.
      - delay: 1500ms
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  micro_wake_word.is_running:
          then:
            - micro_wake_word.start:

voice_assistant:
  id: assist
  microphone: mic
  media_player: esps3_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 3.0
  on_error:
    - switch.turn_off: amp_enable
    - light.turn_off: led_circle 
    - micro_wake_word.start:
    - light.turn_on:
        id: led_circle           
        red: 70%
        green: 0%
        blue: 0%
        brightness: 40%
        effect: "Error Swirl"
    - delay: 3s
    - light.turn_off: led_circle
  on_end:
    - logger.log: "VA Pipeline Ended"
    - if:
        condition:
          lambda: return !id(tts_active);
        then:
          # Delay to ensure media player releases the I2S bus
          - delay: 200ms
          - micro_wake_word.start:
    # Always reset after the branch so stale true can't block future pipelines
    - globals.set:
        id: tts_active
        value: 'false'
  on_stt_end:
    - light.turn_off: led_circle
  on_tts_start:
    - globals.set:
        id: tts_active
        value: 'true'
  on_tts_end:
    # Reset here — TTS audio has finished and VA has fully settled,
    # so on_end (which fires before this) will have already skipped MWW.
    # on_idle's safety-net will then correctly restart MWW.
    - globals.set:
        id: tts_active
        value: 'false'

switch:
  - platform: restart
    name: "Restart Device"
  - platform: gpio
    pin: GPIO02
    id: amp_enable
    name: "Amplifier Output Enable"
    restore_mode: ALWAYS_OFF
  - platform: template
    id: mute
    name: mute
    optimistic: true
    on_turn_on: 
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - switch.turn_off: amp_enable
    on_turn_off:
      - micro_wake_word.start:

micro_wake_word:
  id: mww
  microphone:
    microphone: mic
  models:
    - model: okay_nabu
      id: okay_nabu_model
    - model: hey_jarvis
      id: hey_jarvis_model
    - model: "https://raw.githubusercontent.com/esphome/micro-wake-word-models/refs/heads/main/models/v2/experiments/okay_computer.json"
      id: okay_computer
    - model: "https://raw.githubusercontent.com/esphome/micro-wake-word-models/refs/heads/main/models/v2/experiments/hey_home_assistant.json"
      id: hey_home_assistant
  on_wake_word_detected:
    - globals.set:
        id: tts_active
        value: 'false'
    - micro_wake_word.stop:
    - switch.turn_on: amp_enable
    - delay: 50ms             # give amp time to stabilise before audio starts
    - media_player.speaker.play_on_device_media_file:
        media_file: alert_sound
        announcement: true    
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
    - light.turn_off: led_circle                    
    - light.turn_on:
        id: led_circle           
        effect: "Listening Swirl"
        brightness: 90%

light:
  - platform: esp32_rmt_led_strip
    id: led_circle
    rgb_order: GRB
    pin: GPIO12
    num_leds: 25
    chipset: ws2812
    name: "light Ring"
    effects:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.45s
          update_interval: 0.45s
          min_brightness: 0%
          max_brightness: 50%
      - pulse:
          name: "Slow Pulse"
          transition_length: 2.0s
          update_interval: 2.0s
          min_brightness: 0%
          max_brightness: 100%
      - random:
          name: "Random Colors"
          transition_length: 1s
          update_interval: 2s
      - addressable_color_wipe:
          name: "Listening Swirl"
          colors:
            - red: 0%
              green: 80%
              blue: 80%
              num_leds: 10
              gradient: true
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 14            
          add_led_interval: 60ms
      - addressable_color_wipe:
          name: Talking Swirl
          colors:
            - red: 50%
              green: 0%
              blue: 80%
              num_leds: 12
              gradient: true
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 12             
          add_led_interval: 70ms
          reverse: True
      - addressable_color_wipe:
          name: Error Swirl
          colors:
            - red: 60%
              green: 0%
              blue: 0%
              num_leds: 14
              gradient: true
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 10             
          add_led_interval: 50ms
          reverse: True
      - flicker:
          name: Flicker Effect
          alpha: 95%
          intensity: 1.5%
      - addressable_scan:
          name: Single Scan
          move_interval: 30ms
          scan_width: 1
      - addressable_rainbow:
          name: Rainbow Effect
          speed: 12
          width: 24
      - addressable_twinkle:
          name: Twinkly
          twinkle_probability: 5%
          progress_interval: 4ms

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
